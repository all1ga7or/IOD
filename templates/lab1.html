<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛР1 — Вибір серіалів</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 { color: #bb86fc; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #a0a0a0; }
        .voting-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }
        select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 16px;
            appearance: none;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #bb86fc; }
        button {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            background-color: #bb86fc;
            color: #121212;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #9965f4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Топ серіалів</h1>
            <p>Експерт: <b>{{ session['expert_name'] }}</b> | Розподілене анонімне опитування</p>
        </div>
        <div class="voting-card">
            <form method="POST">
                <div class="form-group">
                    <label>🥇 1 місце (Найвищий пріоритет)</label>
                    <select name="rank1" required>
                        <option value="" disabled selected>Оберіть найкращий серіал...</option>
                        {% for s in series %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>🥈 2 місце</label>
                    <select name="rank2" required>
                        <option value="" disabled selected>Оберіть серіал...</option>
                        {% for s in series %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>🥉 3 місце</label>
                    <select name="rank3" required>
                        <option value="" disabled selected>Оберіть серіал...</option>
                        {% for s in series %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                </div>
                <button type="submit">Відправити голос</button>
            </form>
        </div>
    </div>
</body>
</html>
