<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Система експертного оцінювання</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #bb86fc; }
        p { color: #a0a0a0; margin-bottom: 30px; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: #bb86fc; }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: #bb86fc;
            color: #121212;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover { background-color: #9965f4; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Вітаємо в системі</h1>
        <p>Введіть своє ім'я для участі в експертному опитуванні</p>
        <form method="POST">
            <input type="text" name="name" placeholder="Ваше ім'я (напр. Експерт 1)" required autocomplete="off">
            <button type="submit">Увійти</button>
        </form>
    </div>
</body>
</html>
